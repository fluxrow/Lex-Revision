<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Lex Revision — App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_prototype_app/styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="_prototype_app/Icon.jsx"></script>
  <script type="text/babel" src="_prototype_app/Shell.jsx"></script>
  <script type="text/babel" src="_prototype_app/data.jsx"></script>
  <script type="text/babel" src="_prototype_app/Auth.jsx"></script>
  <script type="text/babel" src="_prototype_app/Dashboard.jsx"></script>
  <script type="text/babel" src="_prototype_app/Novo.jsx"></script>
  <script type="text/babel" src="_prototype_app/Pages.jsx"></script>

  <script type="text/babel">
    function App() {
      const [theme, setTheme] = useTheme();
      const [route, nav] = useRoute();
      const [authed, setAuthed] = React.useState(() => {
        try { return localStorage.getItem('lex-revision-authed') === '1'; } catch { return false; }
      });
      React.useEffect(() => {
        try { localStorage.setItem('lex-revision-authed', authed ? '1' : '0'); } catch {}
      }, [authed]);

      if (!authed || route === 'auth') {
        return <AuthPage mode="login" onDone={() => { setAuthed(true); nav('dashboard'); }}/>;
      }

      const [section, ...rest] = route.split('/');
      const sub = rest.join('/');

      const title = ({
        dashboard: 'Início',
        novo: 'Novo contrato',
        historico: 'Histórico',
        modelos: 'Modelos',
        clientes: 'Clientes',
        assinatura: 'Assinaturas',
        config: 'Configurações',
        faturamento: 'Faturamento',
      })[section] || 'Lex Revision';

      return (
        <div className="app">
          <Sidebar route={route} nav={nav}/>
          <div className="app-main">
            <Topbar title={title} theme={theme} setTheme={setTheme}
              actions={<button className="btn btn-ghost btn-sm" onClick={() => setAuthed(false)}><Icon name="logout" size={13}/>Sair</button>}/>
            <div className="app-content">
              {section === 'dashboard'   && <Dashboard nav={nav}/>}
              {section === 'novo'        && <NovoContrato subRoute={sub} nav={nav}/>}
              {section === 'historico'   && <Historico nav={nav}/>}
              {section === 'modelos'     && <Modelos nav={nav}/>}
              {section === 'clientes'    && <Clientes/>}
              {section === 'assinatura'  && <Assinatura/>}
              {section === 'config'      && <Config theme={theme} setTheme={setTheme}/>}
              {section === 'faturamento' && <Faturamento/>}
            </div>
          </div>
          <MobileNav route={route} nav={nav}/>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
